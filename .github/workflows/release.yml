name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  release:
    name: Build GitHub Release
    runs-on: macos-14

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Show Swift version
        run: swift --version

      - name: Run tests
        run: swift test

      - name: Build release package
        run: ./script/package_release.sh "${GITHUB_REF_NAME#v}"

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "$GITHUB_REF_NAME" \
            dist/release/*.zip \
            dist/release/*.sha256 \
            --verify-tag \
            --title "ModbusWorkbench $GITHUB_REF_NAME" \
            --generate-notes
