name: Feature request
description: 建议新功能或改进
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: 这个功能要解决什么问题
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposal
      description: 你建议如何实现或呈现
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives
      description: 你考虑过哪些替代方案
    validations:
      required: false
